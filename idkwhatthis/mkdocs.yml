site_name: GitHub User Guide
docs_dir: docs

theme:
  name: material
  features:
    - navigation.expand
    - navigation.sections
    - toc.integrate
  palette:
    # Light mode
    - scheme: default
      primary: magenta
      accent: magenta
      toggle:
        icon: material/weather-night
        name: Dark mode

    # Dark mode
    - scheme: slate
      primary: magenta
      accent: magenta
      toggle:
        icon: material/weather-sunny
        name: Light mode

nav:
  - Home: index.md
  - gitbash: gitbash-vscode-terminal-connection.md
  - new-git: new-github-repo.md
  - pushing: pushing-existing-project.md
  - working: working-with-existing-code-on-github.md
  - glossary: glossary.md
  - troubleshooting: troubleshooting.md
  


markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - tables