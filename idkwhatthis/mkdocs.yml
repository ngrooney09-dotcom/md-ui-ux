site_name: GitHub User Guide

docs_dir: docs

theme:
  name: material
  palette:
    # Light mode
    - scheme: default
      primary: magenta
      accent: magenta
      toggle:
        icon: material/weather-night
        name: Dark mode

    # Dark mode
    - scheme: slate
      primary: magenta
      accent: magenta
      toggle:
        icon: material/weather-sunny
        name: Light mode

nav:
  - Home: home.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences